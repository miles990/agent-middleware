<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Middleware · Control</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Instrument+Sans:wght@400;500;600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0c;
  --surface: #111115;
  --surface-2: #1a1a20;
  --border: #2a2a35;
  --border-active: #3a3a48;
  --text: #e0e0e8;
  --text-dim: #6a6a78;
  --text-muted: #4a4a58;
  --accent: #00d4aa;
  --accent-dim: #00d4aa33;
  --warn: #f5a623;
  --warn-dim: #f5a62333;
  --error: #e74c5e;
  --error-dim: #e74c5e33;
  --success: #00d4aa;
  --info: #5b8def;
  --info-dim: #5b8def33;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Instrument Sans', sans-serif;
}

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Noise overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

/* Header */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 32px;
  height: 32px;
  background: var(--accent);
  border-radius: 6px;
  display: grid;
  place-items: center;
  font-family: var(--mono);
  font-weight: 700;
  font-size: 14px;
  color: var(--bg);
}

.logo h1 {
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 0.5px;
}

.logo h1 span { color: var(--text-dim); font-weight: 300; }

.header-status {
  display: flex;
  align-items: center;
  gap: 16px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-dim);
}

.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 2s ease infinite;
}

.status-dot.offline { background: var(--error); animation: none; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* Main Grid */
main {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto 1fr;
  gap: 1px;
  background: var(--border);
  min-height: calc(100vh - 57px);
}

/* Panels */
.panel {
  background: var(--surface);
  padding: 20px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  flex-shrink: 0;
}

.panel-title {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-dim);
}

.panel-badge {
  font-family: var(--mono);
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 3px;
  background: var(--accent-dim);
  color: var(--accent);
}

.panel-body {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

/* Worker Cards */
.worker-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.worker-card {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.15s;
  position: relative;
}

.worker-card:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
}

.worker-card .name {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 4px;
}

.worker-card .meta {
  font-size: 11px;
  color: var(--text-dim);
  display: flex;
  gap: 8px;
}

.worker-card .backend-tag {
  font-family: var(--mono);
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 2px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.backend-tag.sdk { background: var(--accent-dim); color: var(--accent); }
.backend-tag.shell { background: var(--warn-dim); color: var(--warn); }
.backend-tag.acp { background: var(--info-dim); color: var(--info); }

.worker-card .model {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-muted);
}

.worker-actions {
  position: absolute;
  top: 8px;
  right: 8px;
  opacity: 0;
  transition: opacity 0.2s;
}

.worker-card:hover .worker-actions { opacity: 1; }

.btn-icon {
  width: 24px; height: 24px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface);
  color: var(--text-dim);
  cursor: pointer;
  display: grid;
  place-items: center;
  font-size: 12px;
  transition: all 0.15s;
}

.btn-icon:hover { border-color: var(--accent); color: var(--accent); }

/* Task List */
.task-item {
  display: grid;
  grid-template-columns: 8px 1fr auto;
  gap: 12px;
  align-items: start;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}

.task-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-top: 5px;
}

.task-dot.pending { background: var(--text-muted); }
.task-dot.running { background: var(--info); animation: pulse 1s ease infinite; }
.task-dot.completed { background: var(--success); }
.task-dot.failed { background: var(--error); }
.task-dot.timeout { background: var(--warn); }
.task-dot.skipped { background: var(--text-muted); opacity: 0.5; }
.task-dot.cancelled { background: var(--text-muted); opacity: 0.3; }

.task-info .task-worker {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--accent);
}

.task-info .task-desc {
  font-size: 13px;
  color: var(--text);
  margin-top: 2px;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.task-meta {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  text-align: right;
  white-space: nowrap;
}

/* Event Stream */
.event-line {
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.6;
  color: var(--text-dim);
  padding: 2px 0;
  animation: fadeIn 0.2s ease;
}

.event-line .ts { color: var(--text-muted); }
.event-line .type { font-weight: 500; }
.event-line .type.submitted { color: var(--info); }
.event-line .type.started { color: var(--warn); }
.event-line .type.completed { color: var(--success); }
.event-line .type.failed { color: var(--error); }
.event-line .type.cancelled { color: var(--text-muted); }

/* Plan DAG */
.plan-item {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
  margin-bottom: 8px;
}

.plan-goal {
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 8px;
}

.plan-steps {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.plan-step-chip {
  font-family: var(--mono);
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 3px;
  border: 1px solid var(--border);
}

.plan-step-chip.completed { border-color: var(--success); color: var(--success); }
.plan-step-chip.running { border-color: var(--info); color: var(--info); }
.plan-step-chip.failed { border-color: var(--error); color: var(--error); }
.plan-step-chip.pending { border-color: var(--text-muted); color: var(--text-muted); }

.plan-summary {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 8px;
}

/* Worker Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
  place-items: center;
  backdrop-filter: blur(4px);
}

.modal-overlay.active { display: grid; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px;
  width: 480px;
  max-height: 80vh;
  overflow-y: auto;
}

.modal h2 {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 16px;
}

.form-group {
  margin-bottom: 12px;
}

.form-group label {
  display: block;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}

.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  padding: 8px 10px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}

.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--accent);
}

.form-group textarea { resize: vertical; min-height: 60px; }

.form-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 16px;
}

.btn {
  font-family: var(--mono);
  font-size: 12px;
  padding: 8px 16px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text);
  cursor: pointer;
  transition: all 0.15s;
}

.btn:hover { border-color: var(--accent); }

.btn-primary {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
}

.btn-primary:hover { opacity: 0.9; }

.btn-danger {
  border-color: var(--error);
  color: var(--error);
}

.btn-danger:hover { background: var(--error-dim); }

/* Empty State */
.empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 120px;
  color: var(--text-muted);
  font-size: 13px;
}

.empty-icon { font-size: 24px; margin-bottom: 8px; opacity: 0.5; }

/* Dispatch Bar */
.dispatch-bar {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  flex-shrink: 0;
}

.dispatch-bar select {
  padding: 6px 8px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
}

.dispatch-bar input {
  flex: 1;
  padding: 6px 10px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  outline: none;
}

.dispatch-bar input:focus { border-color: var(--accent); }

@media (max-width: 900px) {
  main { grid-template-columns: 1fr; }
  .worker-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">MW</div>
    <h1>AGENT MIDDLEWARE <span>· CONTROL</span></h1>
  </div>
  <div class="header-status">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">connecting...</span>
    <span id="task-count">0 tasks</span>
  </div>
</header>

<main>
  <!-- Workers Panel -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Workers</span>
      <button class="btn" onclick="openAddWorker()" style="font-size:11px;padding:4px 10px;">+ Add Worker</button>
    </div>
    <div class="panel-body">
      <div class="worker-grid" id="worker-grid"></div>
    </div>
  </div>

  <!-- Tasks Panel -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Tasks</span>
      <span class="panel-badge" id="active-badge">0 active</span>
    </div>
    <div class="panel-body" id="task-list"></div>
    <div class="dispatch-bar">
      <select id="dispatch-worker"></select>
      <input id="dispatch-task" placeholder="Task description..." onkeydown="if(event.key==='Enter')dispatch()">
      <button class="btn btn-primary" onclick="dispatch()" style="padding:6px 12px;">Send</button>
    </div>
  </div>

  <!-- Plans Panel -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Plans</span>
      <span class="panel-badge" id="plan-badge">0 plans</span>
    </div>
    <div class="panel-body" id="plan-list">
      <div class="empty"><div class="empty-icon">◇</div>No plans submitted yet</div>
    </div>
  </div>

  <!-- Event Stream Panel -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Event Stream</span>
      <span class="panel-badge">SSE</span>
    </div>
    <div class="panel-body" id="event-stream" style="font-size:11px;"></div>
  </div>
</main>

<!-- Worker Edit Modal -->
<div class="modal-overlay" id="worker-modal">
  <div class="modal">
    <h2 id="modal-title">Add Worker</h2>
    <div class="form-group">
      <label>Name</label>
      <input id="wm-name" placeholder="e.g. translator">
    </div>
    <div class="form-group">
      <label>Backend</label>
      <select id="wm-backend">
        <option value="sdk">SDK (Agent SDK subagent)</option>
        <option value="acp">ACP (cross-CLI session)</option>
        <option value="shell">Shell (direct bash)</option>
      </select>
    </div>
    <div class="form-group">
      <label>Model</label>
      <select id="wm-model">
        <option value="sonnet">Sonnet (balanced)</option>
        <option value="opus">Opus (deep reasoning)</option>
        <option value="haiku">Haiku (fast + cheap)</option>
      </select>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="wm-desc" placeholder="When to use this worker..."></textarea>
    </div>
    <div class="form-group">
      <label>Prompt (Identity)</label>
      <textarea id="wm-prompt" placeholder="You are a..."></textarea>
    </div>
    <div class="form-group">
      <label>Tools (comma-separated)</label>
      <input id="wm-tools" placeholder="Read, Grep, Glob, Bash">
    </div>
    <div class="form-group">
      <label>Max Turns</label>
      <input id="wm-turns" type="number" value="10">
    </div>
    <div class="form-group">
      <label>Timeout (seconds)</label>
      <input id="wm-timeout" type="number" value="120">
    </div>
    <div class="form-actions">
      <button class="btn btn-danger" id="wm-delete" onclick="deleteWorker()" style="display:none;">Delete</button>
      <div style="flex:1"></div>
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveWorker()">Save</button>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let workers = {};
let tasks = [];
let editingWorker = null;

// ─── Init ───
async function init() {
  await loadWorkers();
  await loadTasks();
  connectSSE();
  setInterval(loadTasks, 10000);
}

// ─── Workers ───
async function loadWorkers() {
  try {
    const res = await fetch(`${API}/pool`);
    const data = await res.json();
    workers = {};
    for (const w of data.workers) workers[w.name] = w;
    renderWorkers();
    renderWorkerSelect();
  } catch { setOffline(); }
}

function renderWorkers() {
  const grid = document.getElementById('worker-grid');
  const entries = Object.entries(workers);
  if (entries.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">⚙</div>No workers configured</div>';
    return;
  }
  grid.innerHTML = entries.map(([name, w]) => `
    <div class="worker-card" onclick="editWorker('${name}')">
      <div class="worker-actions"><button class="btn-icon" title="Edit">✎</button></div>
      <div class="name">${name}</div>
      <div class="meta">
        <span class="backend-tag ${w.backend}">${w.backend}</span>
        <span class="model">${w.model || '—'}</span>
      </div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">${w.timeout}s timeout</div>
    </div>
  `).join('');
}

function renderWorkerSelect() {
  const select = document.getElementById('dispatch-worker');
  select.innerHTML = Object.keys(workers).map(n => `<option value="${n}">${n}</option>`).join('');
}

// ─── Tasks ───
async function loadTasks() {
  try {
    const res = await fetch(`${API}/tasks?limit=50`);
    const data = await res.json();
    tasks = data.tasks;
    renderTasks();
    setOnline();
  } catch { setOffline(); }
}

function renderTasks() {
  const list = document.getElementById('task-list');
  const active = tasks.filter(t => t.status === 'running' || t.status === 'pending');
  document.getElementById('active-badge').textContent = `${active.length} active`;
  document.getElementById('task-count').textContent = `${tasks.length} tasks`;

  if (tasks.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">◎</div>No tasks yet. Dispatch one below.</div>';
    return;
  }

  list.innerHTML = tasks.map(t => {
    const dur = t.durationMs ? `${(t.durationMs / 1000).toFixed(1)}s` : '';
    const time = t.submittedAt ? new Date(t.submittedAt).toLocaleTimeString('en', {hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}) : '';
    return `
      <div class="task-item">
        <div class="task-dot ${t.status}"></div>
        <div class="task-info">
          <div class="task-worker">${t.worker} <span style="color:var(--text-muted);font-weight:300;">${t.status}</span></div>
          <div class="task-desc">${escHtml(t.task?.slice(0, 200) || '')}</div>
        </div>
        <div class="task-meta">${dur}<br>${time}</div>
      </div>
    `;
  }).join('');
}

// ─── Dispatch ───
async function dispatch() {
  const worker = document.getElementById('dispatch-worker').value;
  const task = document.getElementById('dispatch-task').value.trim();
  if (!task) return;

  try {
    await fetch(`${API}/dispatch`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ worker, task, caller: 'dashboard' }),
    });
    document.getElementById('dispatch-task').value = '';
    setTimeout(loadTasks, 500);
  } catch (e) { console.error('Dispatch failed:', e); }
}

// ─── SSE Events ───
function connectSSE() {
  const es = new EventSource(`${API}/events`);
  const stream = document.getElementById('event-stream');

  const addEvent = (type, data) => {
    const ts = new Date().toLocaleTimeString('en', {hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const shortType = type.replace('task.', '');
    const line = document.createElement('div');
    line.className = 'event-line';
    let info = '';
    try {
      const d = JSON.parse(data);
      info = `${d.worker || ''} ${(d.task || '').slice(0, 60)}`;
    } catch { info = data.slice(0, 60); }
    line.innerHTML = `<span class="ts">${ts}</span> <span class="type ${shortType}">${shortType}</span> ${escHtml(info)}`;
    stream.prepend(line);
    if (stream.children.length > 200) stream.lastChild.remove();
  };

  for (const evt of ['task.submitted','task.started','task.completed','task.failed','task.cancelled']) {
    es.addEventListener(evt, (e) => {
      addEvent(evt, e.data);
      loadTasks();
    });
  }

  es.onerror = () => {
    addEvent('error', 'SSE disconnected — retrying...');
    setOffline();
  };
  es.onopen = () => setOnline();
}

// ─── Worker Modal ───
function openAddWorker() {
  editingWorker = null;
  document.getElementById('modal-title').textContent = 'Add Worker';
  document.getElementById('wm-name').value = '';
  document.getElementById('wm-name').disabled = false;
  document.getElementById('wm-backend').value = 'sdk';
  document.getElementById('wm-model').value = 'sonnet';
  document.getElementById('wm-desc').value = '';
  document.getElementById('wm-prompt').value = '';
  document.getElementById('wm-tools').value = 'Read, Grep, Glob, Bash';
  document.getElementById('wm-turns').value = '10';
  document.getElementById('wm-timeout').value = '120';
  document.getElementById('wm-delete').style.display = 'none';
  document.getElementById('worker-modal').classList.add('active');
}

function editWorker(name) {
  editingWorker = name;
  const w = workers[name];
  document.getElementById('modal-title').textContent = `Edit: ${name}`;
  document.getElementById('wm-name').value = name;
  document.getElementById('wm-name').disabled = true;
  document.getElementById('wm-backend').value = w.backend || 'sdk';
  document.getElementById('wm-model').value = w.model || 'sonnet';
  document.getElementById('wm-desc').value = w.description || '';
  document.getElementById('wm-prompt').value = w.prompt || '';
  document.getElementById('wm-tools').value = (w.tools || []).join(', ');
  document.getElementById('wm-turns').value = w.maxTurns || 10;
  document.getElementById('wm-timeout').value = w.timeout || 120;
  document.getElementById('wm-delete').style.display = 'block';
  document.getElementById('worker-modal').classList.add('active');
}

function closeModal() {
  document.getElementById('worker-modal').classList.remove('active');
}

async function saveWorker() {
  const data = {
    name: document.getElementById('wm-name').value.trim(),
    backend: document.getElementById('wm-backend').value,
    model: document.getElementById('wm-model').value,
    description: document.getElementById('wm-desc').value,
    prompt: document.getElementById('wm-prompt').value,
    tools: document.getElementById('wm-tools').value.split(',').map(s => s.trim()).filter(Boolean),
    maxTurns: parseInt(document.getElementById('wm-turns').value) || 10,
    timeout: parseInt(document.getElementById('wm-timeout').value) || 120,
  };
  if (!data.name) return;

  // TODO: POST /api/workers to persist (for now, just update local state)
  workers[data.name] = data;
  renderWorkers();
  renderWorkerSelect();
  closeModal();
}

async function deleteWorker() {
  if (!editingWorker) return;
  if (!confirm(`Delete worker "${editingWorker}"?`)) return;
  delete workers[editingWorker];
  renderWorkers();
  renderWorkerSelect();
  closeModal();
}

// ─── Status ───
function setOnline() {
  document.getElementById('status-dot').className = 'status-dot';
  document.getElementById('status-text').textContent = 'connected';
}

function setOffline() {
  document.getElementById('status-dot').className = 'status-dot offline';
  document.getElementById('status-text').textContent = 'disconnected';
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

init();
</script>
</body>
</html>
