<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Middleware · Control</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Instrument+Sans:wght@400;500;600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #08080b;
  --surface: #0e0e13;
  --surface-2: #16161e;
  --surface-3: #1e1e28;
  --border: #252530;
  --border-active: #35354a;
  --text: #e0e0e8;
  --text-dim: #6a6a78;
  --text-muted: #45455a;
  --accent: #00d4aa;
  --accent-dim: #00d4aa22;
  --warn: #f5a623;
  --warn-dim: #f5a62322;
  --error: #e74c5e;
  --error-dim: #e74c5e22;
  --success: #00d4aa;
  --info: #5b8def;
  --info-dim: #5b8def22;
  --purple: #a78bfa;
  --purple-dim: #a78bfa22;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Instrument Sans', sans-serif;
  --radius: 6px;
}

body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }
body::before { content: ''; position: fixed; inset: 0; background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.02'/%3E%3C/svg%3E"); pointer-events: none; z-index: 9999; }

/* Header */
header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--surface); }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 28px; height: 28px; background: var(--accent); border-radius: 5px; display: grid; place-items: center; font-family: var(--mono); font-weight: 700; font-size: 11px; color: var(--bg); }
.logo h1 { font-family: var(--mono); font-size: 13px; font-weight: 500; letter-spacing: 0.5px; }
.logo h1 span { color: var(--text-dim); font-weight: 300; }
.header-right { display: flex; align-items: center; gap: 14px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 2s ease infinite; }
.status-dot.offline { background: var(--error); animation: none; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* Tabs */
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); background: var(--surface); padding: 0 20px; }
.tab { font-family: var(--mono); font-size: 11px; padding: 10px 16px; color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; letter-spacing: 0.5px; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; background: var(--accent-dim); color: var(--accent); margin-left: 6px; }

/* Panels */
.panel-area { display: none; padding: 16px 20px; min-height: calc(100vh - 90px); }
.panel-area.active { display: block; }

/* Grid layouts */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

/* Cards */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.card-title { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); }
.card-body { max-height: 500px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

/* Worker cards */
.worker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
.worker-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; cursor: pointer; transition: all 0.15s; position: relative; }
.worker-card:hover { border-color: var(--accent); transform: translateY(-1px); }
.worker-card .name { font-family: var(--mono); font-size: 12px; font-weight: 500; margin-bottom: 3px; }
.worker-card .meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.tag { font-family: var(--mono); font-size: 9px; padding: 1px 5px; border-radius: 2px; letter-spacing: 0.3px; }
.tag.sdk { background: var(--accent-dim); color: var(--accent); }
.tag.shell { background: var(--warn-dim); color: var(--warn); }
.tag.acp { background: var(--info-dim); color: var(--info); }
.tag.middleware { background: var(--purple-dim); color: var(--purple); }
.tag.custom { background: var(--warn-dim); color: var(--warn); font-size: 8px; }
.worker-status { font-size: 10px; margin-top: 4px; }

/* Task list */
.task-item { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; cursor: pointer; transition: border-color 0.2s; overflow: hidden; }
.task-item:hover { border-color: var(--border-active); }
.task-item.expanded { border-color: var(--accent); }
.task-header { display: grid; grid-template-columns: 10px 1fr auto; gap: 10px; align-items: center; padding: 10px 12px; }
.task-dot { width: 8px; height: 8px; border-radius: 50%; }
.task-dot.pending { background: var(--text-muted); }
.task-dot.running { background: var(--info); animation: pulse 1s ease infinite; }
.task-dot.completed { background: var(--success); }
.task-dot.failed, .task-dot.timeout { background: var(--error); }
.task-dot.skipped, .task-dot.condition_skipped, .task-dot.cancelled { background: var(--text-muted); opacity: 0.4; }
.task-worker { font-family: var(--mono); font-size: 11px; color: var(--accent); }
.task-desc { font-size: 12px; color: var(--text); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 500px; }
.task-meta { font-family: var(--mono); font-size: 10px; color: var(--text-dim); text-align: right; white-space: nowrap; }
.task-detail { display: none; padding: 0 12px 12px; border-top: 1px solid var(--border); }
.task-item.expanded .task-detail { display: block; }
.task-detail pre { font-family: var(--mono); font-size: 11px; color: var(--text-dim); background: var(--surface-3); padding: 10px; border-radius: 4px; overflow-x: auto; white-space: pre-wrap; word-break: break-word; max-height: 300px; overflow-y: auto; margin-top: 8px; }

/* Plan DAG visualization */
.plan-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
.plan-goal { font-size: 13px; font-weight: 500; margin-bottom: 10px; }
.plan-summary { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-bottom: 12px; }
.dag-container { position: relative; padding: 12px 0; }
.dag-layer { display: flex; align-items: center; margin-bottom: 0; }
.dag-layer-label { font-family: var(--mono); font-size: 9px; color: var(--text-muted); min-width: 24px; text-align: center; padding-top: 2px; }
.dag-layer-nodes { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; padding: 6px 0; }
.dag-node { font-family: var(--mono); font-size: 10px; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface-3); position: relative; cursor: default; transition: all 0.2s; min-width: 120px; }
.dag-node:hover { border-color: var(--accent); transform: translateY(-1px); }
.dag-node.completed { border-color: var(--success); background: linear-gradient(135deg, var(--surface-3), #00d4aa08); }
.dag-node.completed .node-label { color: var(--success); }
.dag-node.running { border-color: var(--info); background: linear-gradient(135deg, var(--surface-3), #5b8def08); }
.dag-node.running .node-label { color: var(--info); }
.dag-node.running::after { content: ''; position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px; border-radius: 6px; border: 1px solid var(--info); animation: node-pulse 2s ease infinite; pointer-events: none; }
@keyframes node-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.dag-node.failed, .dag-node.timeout { border-color: var(--error); background: linear-gradient(135deg, var(--surface-3), #e74c5e08); }
.dag-node.failed .node-label, .dag-node.timeout .node-label { color: var(--error); }
.dag-node.pending { border-color: var(--text-muted); }
.dag-node.pending .node-label { color: var(--text-dim); }
.dag-node.skipped, .dag-node.condition_skipped { border-color: var(--text-muted); opacity: 0.35; }
.node-label { font-size: 11px; font-weight: 500; margin-bottom: 2px; }
.node-meta { font-size: 9px; color: var(--text-muted); display: flex; gap: 6px; }
.node-status-icon { position: absolute; top: 4px; right: 6px; font-size: 10px; }
.dag-arrows { display: flex; align-items: center; justify-content: center; padding: 0 24px; height: 20px; position: relative; }
.dag-arrows svg { width: 100%; height: 20px; }
.dag-arrow-line { stroke: var(--border); stroke-width: 1; stroke-dasharray: 4 3; }
.dag-arrow-head { fill: var(--text-muted); }

/* Gateway */
.backend-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; }
.backend-info { display: flex; align-items: center; gap: 8px; }
.backend-name { font-family: var(--mono); font-size: 12px; font-weight: 500; }
.backend-cmd { font-family: var(--mono); font-size: 10px; color: var(--text-dim); }
.session-pill { font-family: var(--mono); font-size: 9px; padding: 1px 5px; border-radius: 3px; }
.session-pill.idle { background: var(--accent-dim); color: var(--accent); }
.session-pill.busy { background: var(--info-dim); color: var(--info); }
.session-pill.dead { background: var(--error-dim); color: var(--error); }
.circuit-badge { font-family: var(--mono); font-size: 9px; padding: 1px 5px; border-radius: 3px; }
.circuit-badge.closed { background: var(--accent-dim); color: var(--accent); }
.circuit-badge.open { background: var(--error-dim); color: var(--error); }
.circuit-badge.half-open { background: var(--warn-dim); color: var(--warn); }

/* Event stream */
.event-line { font-family: var(--mono); font-size: 10px; line-height: 1.7; color: var(--text-dim); padding: 1px 0; }
.event-line .ts { color: var(--text-muted); }
.event-line .type { font-weight: 500; }
.event-line .type.submitted { color: var(--info); }
.event-line .type.started { color: var(--warn); }
.event-line .type.completed { color: var(--success); }
.event-line .type.failed { color: var(--error); }

/* Dispatch bar */
.dispatch-bar { display: flex; gap: 6px; margin-top: 12px; padding: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
.dispatch-bar select, .dispatch-bar input { padding: 6px 8px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: var(--mono); font-size: 11px; outline: none; }
.dispatch-bar input { flex: 1; }
.dispatch-bar input:focus { border-color: var(--accent); }

/* Buttons */
.btn { font-family: var(--mono); font-size: 11px; padding: 6px 12px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface-2); color: var(--text); cursor: pointer; transition: all 0.15s; }
.btn:hover { border-color: var(--accent); }
.btn-sm { font-size: 10px; padding: 4px 8px; }
.btn-primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.btn-primary:hover { opacity: 0.9; }
.btn-icon { width: 22px; height: 22px; border: 1px solid var(--border); border-radius: 4px; background: var(--surface); color: var(--text-dim); cursor: pointer; display: grid; place-items: center; font-size: 11px; }
.btn-icon:hover { border-color: var(--accent); color: var(--accent); }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; place-items: center; backdrop-filter: blur(4px); }
.modal-overlay.active { display: grid; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; width: 460px; max-height: 80vh; overflow-y: auto; }
.modal h2 { font-family: var(--mono); font-size: 13px; font-weight: 500; margin-bottom: 14px; }
.form-group { margin-bottom: 10px; }
.form-group label { display: block; font-family: var(--mono); font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 6px 8px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: var(--mono); font-size: 12px; outline: none; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
.form-group textarea { resize: vertical; min-height: 50px; }
.form-actions { display: flex; justify-content: flex-end; gap: 6px; margin-top: 14px; }

/* Empty */
.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100px; color: var(--text-muted); font-size: 12px; }
.empty-icon { font-size: 20px; margin-bottom: 6px; opacity: 0.4; }

/* Stats bar */
.stats-bar { display: flex; gap: 20px; padding: 10px 20px; background: var(--surface); border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
.stat-item .stat-val { color: var(--text); font-weight: 500; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: translateY(0); } }
.task-item { animation: fadeIn 0.2s ease; }

@media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } .worker-grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">MW</div>
    <h1>AGENT MIDDLEWARE <span>· CONTROL</span></h1>
  </div>
  <div class="header-right">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">connecting...</span>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-item">Tasks: <span class="stat-val" id="stat-tasks">0</span></div>
  <div class="stat-item">Running: <span class="stat-val" id="stat-running">0</span></div>
  <div class="stat-item">Workers: <span class="stat-val" id="stat-workers">0</span></div>
  <div class="stat-item">Backends: <span class="stat-val" id="stat-backends">0</span></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('tasks')">TASKS<span class="tab-badge" id="tab-tasks-badge">0</span></div>
  <div class="tab" onclick="switchTab('plans')">PLANS</div>
  <div class="tab" onclick="switchTab('workers')">WORKERS</div>
  <div class="tab" onclick="switchTab('gateway')">GATEWAY</div>
  <div class="tab" onclick="switchTab('achieved')">ACHIEVED</div>
  <div class="tab" onclick="switchTab('events')">EVENTS</div>
</div>

<!-- Tasks -->
<div class="panel-area active" id="panel-tasks">
  <div class="card-body" id="task-list"></div>
  <div class="dispatch-bar">
    <select id="dispatch-worker"></select>
    <input id="dispatch-task" placeholder="Task description..." onkeydown="if(event.key==='Enter')dispatch()">
    <button class="btn btn-primary" onclick="dispatch()">Dispatch</button>
  </div>
</div>

<!-- Plans -->
<div class="panel-area" id="panel-plans">
  <div id="plan-list"><div class="empty"><div class="empty-icon">◇</div>No plans submitted</div></div>
</div>

<!-- Workers -->
<div class="panel-area" id="panel-workers">
  <div style="display:flex;justify-content:flex-end;margin-bottom:10px;">
    <button class="btn btn-sm" onclick="openAddWorker()">+ Add Worker</button>
  </div>
  <div class="worker-grid" id="worker-grid"></div>
</div>

<!-- Gateway -->
<div class="panel-area" id="panel-gateway">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
    <div id="gateway-stats" style="font-family:var(--mono);font-size:11px;color:var(--text-dim);"></div>
    <button class="btn btn-sm" onclick="openAddBackend()">+ Add Backend</button>
  </div>
  <div id="gateway-backends"></div>
</div>

<!-- Achieved -->
<div class="panel-area" id="panel-achieved">
  <div style="font-family:var(--mono);font-size:11px;color:var(--text-dim);margin-bottom:10px;">Completed tasks auto-move here after 1 hour. Removed after 7 days.</div>
  <div id="achieved-list"><div class="empty"><div class="empty-icon">✓</div>No archived tasks yet</div></div>
</div>

<!-- Events -->
<div class="panel-area" id="panel-events">
  <div class="card-body" id="event-stream" style="font-size:10px;max-height:calc(100vh - 160px);"></div>
</div>

<!-- Worker Modal -->
<div class="modal-overlay" id="worker-modal">
  <div class="modal">
    <h2 id="modal-title">Add Worker</h2>
    <div class="form-group"><label>Name</label><input id="wm-name" placeholder="e.g. translator"></div>
    <div class="form-group"><label>Backend</label>
      <select id="wm-backend"><option value="sdk">SDK</option><option value="acp">ACP</option><option value="shell">Shell</option><option value="middleware">Middleware</option></select>
    </div>
    <div class="form-group"><label>Vendor</label>
      <select id="wm-vendor"><option value="anthropic">Anthropic</option><option value="anthropic-managed">Anthropic Managed</option><option value="openai">OpenAI</option><option value="google">Google</option><option value="local">Local</option></select>
    </div>
    <div class="form-group"><label>Model</label>
      <select id="wm-model"><option value="sonnet">Sonnet</option><option value="opus">Opus</option><option value="haiku">Haiku</option></select>
    </div>
    <div class="form-group"><label>Description</label><textarea id="wm-desc" placeholder="When to use..."></textarea></div>
    <div class="form-group"><label>Prompt</label><textarea id="wm-prompt" placeholder="You are a..."></textarea></div>
    <div class="form-group"><label>Tools</label><input id="wm-tools" placeholder="Read, Grep, Glob, Bash"></div>
    <div class="form-group"><label>Timeout (s)</label><input id="wm-timeout" type="number" value="120"></div>
    <div class="form-actions">
      <button class="btn" id="wm-delete" onclick="deleteWorker()" style="display:none;color:var(--error);border-color:var(--error);">Delete</button>
      <div style="flex:1"></div>
      <button class="btn" onclick="closeModal('worker-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveWorker()">Save</button>
    </div>
  </div>
</div>

<!-- Backend Modal -->
<div class="modal-overlay" id="backend-modal">
  <div class="modal">
    <h2>Register CLI Backend</h2>
    <div class="form-group"><label>Name</label><input id="bm-name" placeholder="e.g. gemini"></div>
    <div class="form-group"><label>Command</label><input id="bm-command" placeholder="e.g. gemini"></div>
    <div class="form-group"><label>Args</label><input id="bm-args" placeholder="--acp, --trust-all-tools"></div>
    <div class="form-group"><label>Max Sessions</label><input id="bm-max" type="number" value="2"></div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal('backend-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveBackend()">Register</button>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let workers = {}, tasks = [], gatewayData = null, editingWorker = null;

// ─── Init ───
async function init() {
  await Promise.all([loadWorkers(), loadTasks(), loadGateway()]);
  connectSSE();
  setInterval(() => { loadTasks(); loadGateway(); }, 8000);
  setInterval(loadWorkers, 15000);
}

// ─── Tabs ───
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel-area').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab[onclick*="${name}"]`).classList.add('active');
  document.getElementById(`panel-${name}`).classList.add('active');
  if (name === 'achieved') loadAchieved();
  if (name === 'plans') loadPlans();
}

// ─── Workers ───
async function loadWorkers() {
  try {
    const res = await fetch(`${API}/workers`);
    const data = await res.json();
    workers = {};
    for (const w of data.workers) {
      workers[w.name] = { ...w, activeTasks: 0 };
    }
    for (const t of tasks) {
      if ((t.status === 'running' || t.status === 'pending') && workers[t.worker]) {
        workers[t.worker].activeTasks = (workers[t.worker].activeTasks || 0) + 1;
      }
    }
    renderWorkers();
    renderWorkerSelect();
    document.getElementById('stat-workers').textContent = Object.keys(workers).length;
  } catch { setOffline(); }
}

function renderWorkers() {
  const grid = document.getElementById('worker-grid');
  const entries = Object.entries(workers);
  if (!entries.length) { grid.innerHTML = '<div class="empty"><div class="empty-icon">⚙</div>No workers</div>'; return; }
  grid.innerHTML = entries.map(([name, w]) => {
    const active = w.activeTasks || 0;
    const color = active > 0 ? 'var(--info)' : 'var(--text-muted)';
    const statusText = active > 0 ? `${active} running` : 'idle';
    const customTag = w.builtin === false ? '<span class="tag custom">custom</span>' : '';
    return `<div class="worker-card" onclick="editWorker('${name}')" style="border-left:3px solid ${color}">
      <div class="name">${name}</div>
      <div class="meta">
        <span class="tag ${w.backend}">${w.backend}</span>
        <span style="font-family:var(--mono);font-size:9px;color:var(--text-muted)">${w.model||'—'}</span>
        ${customTag}
      </div>
      <div class="worker-status" style="color:${color}">${statusText}</div>
    </div>`;
  }).join('');
}

function renderWorkerSelect() {
  document.getElementById('dispatch-worker').innerHTML = Object.keys(workers).map(n => `<option value="${n}">${n}</option>`).join('');
}

// ─── Tasks ───
async function loadTasks() {
  try {
    const res = await fetch(`${API}/tasks?limit=100`);
    const data = await res.json();
    tasks = data.tasks;
    renderTasks();
    setOnline();
  } catch { setOffline(); }
}

function renderTasks() {
  const list = document.getElementById('task-list');
  const active = tasks.filter(t => t.status === 'running' || t.status === 'pending');
  document.getElementById('stat-tasks').textContent = tasks.length;
  document.getElementById('stat-running').textContent = active.length;
  document.getElementById('tab-tasks-badge').textContent = active.length;
  if (!tasks.length) { list.innerHTML = '<div class="empty"><div class="empty-icon">◎</div>No tasks. Dispatch one below.</div>'; return; }
  list.innerHTML = tasks.map(t => {
    const dur = t.durationMs ? `${(t.durationMs/1000).toFixed(1)}s` : '';
    const time = t.submittedAt ? new Date(t.submittedAt).toLocaleTimeString('en',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}) : '';
    const taskStr = typeof t.task === 'string' ? t.task : JSON.stringify(t.task);
    const resultStr = t.result ? (typeof t.result === 'string' ? t.result : JSON.stringify(t.result, null, 2)) : t.error || 'Pending...';
    const displayLabel = t.label || taskStr?.slice(0,120) || '';
    return `<div class="task-item" onclick="this.classList.toggle('expanded')">
      <div class="task-header">
        <div class="task-dot ${t.status}"></div>
        <div>
          <div class="task-worker">${t.worker} <span style="color:var(--text-muted);font-weight:300">${t.status}</span>${t.planId ? ` <span style="font-size:9px;color:var(--purple)">plan</span>` : ''}</div>
          <div class="task-desc">${escHtml(displayLabel)}</div>
        </div>
        <div class="task-meta">${dur}<br>${time}</div>
      </div>
      <div class="task-detail">
        <div style="font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-top:8px;">ID: ${t.id}${t.planId ? ` · Plan: ${t.planId}` : ''}${t.caller ? ` · Caller: ${t.caller}` : ''}</div>
        <pre>${escHtml(resultStr?.slice(0,3000)||'')}</pre>
      </div>
    </div>`;
  }).join('');
}

// ─── Plans (DAG visualization) ───
let plansData = [];

async function loadPlans() {
  try {
    const res = await fetch(`${API}/plans`);
    const data = await res.json();
    plansData = data.plans || [];
    renderPlans();
  } catch {}
}

function renderPlans() {
  const container = document.getElementById('plan-list');
  if (!plansData.length) { container.innerHTML = '<div class="empty"><div class="empty-icon">◇</div>No plans submitted</div>'; return; }

  container.innerHTML = plansData.map(plan => {
    const { planId, goal, steps, completed, failed, running, totalSteps: total } = plan;
    const allDone = completed + failed === total;
    const statusIcon = allDone ? (failed > 0 ? '⚠' : '✅') : running > 0 ? '⏳' : '◻';
    const pct = total > 0 ? Math.round(completed / total * 100) : 0;

    // Group steps by dependency depth for DAG layers
    const depthMap = new Map();
    const getDepth = (s) => {
      if (depthMap.has(s.id)) return depthMap.get(s.id);
      const deps = steps.filter(d => (s.dependsOn||[]).includes(d.id));
      const depth = deps.length === 0 ? 0 : Math.max(...deps.map(getDepth)) + 1;
      depthMap.set(s.id, depth);
      return depth;
    };
    steps.forEach(getDepth);
    const maxDepth = Math.max(0, ...depthMap.values());

    // Build DAG layers with flow arrows
    let dagHtml = '';
    for (let d = 0; d <= maxDepth; d++) {
      const layerSteps = steps.filter(s => depthMap.get(s.id) === d);
      const nodesHtml = layerSteps.map(s => {
        const label = s.label || s.id || s.worker;
        const taskStr = typeof s.task === 'string' ? s.task : '';
        const dur = s.durationMs ? `${(s.durationMs/1000).toFixed(1)}s` : '';
        const statusIcon = s.status === 'completed' ? '✓' : s.status === 'running' ? '●' : s.status === 'failed' || s.status === 'timeout' ? '✗' : s.status === 'pending' ? '○' : '—';
        const deps = (s.dependsOn||[]).length;
        return `<div class="dag-node ${s.status}" title="${escHtml(taskStr.slice(0,300))}">
          <div class="node-status-icon">${statusIcon}</div>
          <div class="node-label">${escHtml(label)}</div>
          <div class="node-meta">
            <span>${s.worker}</span>
            ${dur ? `<span>${dur}</span>` : ''}
            ${deps ? `<span>← ${deps} dep${deps>1?'s':''}</span>` : '<span>parallel</span>'}
          </div>
        </div>`;
      }).join('');

      dagHtml += `<div class="dag-layer">
        <div class="dag-layer-label">${d}</div>
        <div class="dag-layer-nodes">${nodesHtml}</div>
      </div>`;

      if (d < maxDepth) {
        dagHtml += `<div class="dag-arrows"><svg viewBox="0 0 200 20" preserveAspectRatio="none">
          <defs><marker id="ah" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto"><path d="M0,0 L6,2 L0,4" class="dag-arrow-head"/></marker></defs>
          <line x1="100" y1="2" x2="100" y2="16" class="dag-arrow-line" marker-end="url(#ah)"/>
        </svg></div>`;
      }
    }

    return `<div class="plan-card">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div class="plan-goal">${statusIcon} ${escHtml(goal || planId)}</div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--text-dim);">${pct}%</div>
      </div>
      <div style="font-family:var(--mono);font-size:9px;color:var(--text-muted);margin-bottom:4px;">${planId}</div>
      <div class="plan-summary">${completed} done · ${running} running · ${failed} failed · ${total} total</div>
      <div style="height:3px;background:var(--surface-3);border-radius:2px;margin:8px 0;">
        <div style="height:100%;width:${pct}%;background:${failed>0?'var(--warn)':'var(--accent)'};border-radius:2px;transition:width 0.3s;"></div>
      </div>
      <div class="dag-container">${dagHtml}</div>
    </div>`;
  }).join('');
}

// ─── Dispatch ───
async function dispatch() {
  const worker = document.getElementById('dispatch-worker').value;
  const task = document.getElementById('dispatch-task').value.trim();
  if (!task) return;
  await fetch(`${API}/dispatch`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({worker, task, caller:'dashboard'}) });
  document.getElementById('dispatch-task').value = '';
  setTimeout(loadTasks, 500);
}

// ─── Gateway ───
async function loadGateway() {
  try {
    const res = await fetch(`${API}/gateway`);
    gatewayData = await res.json();
    renderGateway();
    document.getElementById('stat-backends').textContent = gatewayData.backends.length;
  } catch {}
}

function renderGateway() {
  if (!gatewayData) return;
  document.getElementById('gateway-stats').innerHTML = `Dispatched: <span style="color:var(--text)">${gatewayData.totalDispatched}</span>`;
  const c = document.getElementById('gateway-backends');
  if (!gatewayData.backends.length) { c.innerHTML = '<div class="empty"><div class="empty-icon">⬡</div>No CLI backends</div>'; return; }
  c.innerHTML = gatewayData.backends.map(b => {
    const s = b.sessions;
    const pills = [];
    if (s.idle>0) pills.push(`<span class="session-pill idle">${s.idle} idle</span>`);
    if (s.busy>0) pills.push(`<span class="session-pill busy">${s.busy} busy</span>`);
    if (s.dead>0) pills.push(`<span class="session-pill dead">${s.dead} dead</span>`);
    const circuit = b.circuit ? `<span class="circuit-badge ${b.circuit.state}">${b.circuit.state}${b.circuit.failures ? ` (${b.circuit.failures})` : ''}</span>` : '';
    const healthDot = b.healthy ? '●' : '<span style="color:var(--error)">●</span>';
    return `<div class="backend-card">
      <div class="backend-info">${healthDot} <span class="backend-name">${b.name}</span> <span class="backend-cmd">${b.command}</span> ${circuit}</div>
      <div style="display:flex;gap:4px;align-items:center">${pills.join('')} <button class="btn-icon" onclick="removeBackend('${b.name}')" title="Remove">✕</button></div>
    </div>`;
  }).join('');
}

// ─── SSE ───
function connectSSE() {
  const es = new EventSource(`${API}/events`);
  const stream = document.getElementById('event-stream');
  const addEvent = (type, data) => {
    const ts = new Date().toLocaleTimeString('en',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const shortType = type.replace('task.','');
    let info = '';
    try { const d = JSON.parse(data); info = `${d.worker||''} ${(typeof d.task==='string'?d.task:'').slice(0,50)}`; } catch { info = data.slice(0,50); }
    const line = document.createElement('div');
    line.className = 'event-line';
    line.innerHTML = `<span class="ts">${ts}</span> <span class="type ${shortType}">${shortType}</span> ${escHtml(info)}`;
    stream.prepend(line);
    if (stream.children.length > 300) stream.lastChild.remove();
  };
  ['task.submitted','task.started','task.completed','task.failed','task.cancelled'].forEach(evt => {
    es.addEventListener(evt, e => { addEvent(evt, e.data); loadTasks().then(() => { loadWorkers(); loadPlans(); }); });
  });
  es.onerror = () => setOffline();
  es.onopen = () => setOnline();
}

// ─── Worker Modal ───
function openAddWorker() { editingWorker=null; document.getElementById('modal-title').textContent='Add Worker'; ['wm-name','wm-desc','wm-prompt'].forEach(id=>document.getElementById(id).value=''); document.getElementById('wm-name').disabled=false; document.getElementById('wm-tools').value='Read, Grep, Glob, Bash'; document.getElementById('wm-timeout').value='120'; document.getElementById('wm-delete').style.display='none'; document.getElementById('worker-modal').classList.add('active'); }
function editWorker(name) { editingWorker=name; const w=workers[name]; document.getElementById('modal-title').textContent=`Edit: ${name}`; document.getElementById('wm-name').value=name; document.getElementById('wm-name').disabled=true; document.getElementById('wm-backend').value=w.backend||'sdk'; document.getElementById('wm-vendor').value=w.vendor||'anthropic'; document.getElementById('wm-model').value=w.model||'sonnet'; document.getElementById('wm-desc').value=w.description||''; document.getElementById('wm-prompt').value=w.prompt||''; document.getElementById('wm-tools').value=(w.tools||[]).join(', '); document.getElementById('wm-timeout').value=w.timeout||120; document.getElementById('wm-delete').style.display=w.builtin===false?'block':'none'; document.getElementById('worker-modal').classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
async function saveWorker() { const d={name:document.getElementById('wm-name').value.trim(),backend:document.getElementById('wm-backend').value,vendor:document.getElementById('wm-vendor').value,model:document.getElementById('wm-model').value,description:document.getElementById('wm-desc').value,prompt:document.getElementById('wm-prompt').value,tools:document.getElementById('wm-tools').value.split(',').map(s=>s.trim()).filter(Boolean),timeout:parseInt(document.getElementById('wm-timeout').value)||120}; if(!d.name)return; try{const url=editingWorker?`${API}/workers/${d.name}`:`${API}/workers`;const r=await fetch(url,{method:editingWorker?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});const res=await r.json();if(res.error){alert(res.error);return;}await loadWorkers();closeModal('worker-modal');}catch(e){alert(e);}}
async function deleteWorker() { if(!editingWorker||!confirm(`Delete "${editingWorker}"?`))return; await fetch(`${API}/workers/${editingWorker}`,{method:'DELETE'}); await loadWorkers(); closeModal('worker-modal'); }

// ─── Backend Modal ───
function openAddBackend() { ['bm-name','bm-command','bm-args'].forEach(id=>document.getElementById(id).value=''); document.getElementById('bm-max').value='2'; document.getElementById('backend-modal').classList.add('active'); }
async function saveBackend() { const d={name:document.getElementById('bm-name').value.trim(),command:document.getElementById('bm-command').value.trim(),args:document.getElementById('bm-args').value.split(',').map(s=>s.trim()).filter(Boolean),maxSessions:parseInt(document.getElementById('bm-max').value)||2}; if(!d.name||!d.command)return; await fetch(`${API}/gateway/backends`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}); await loadGateway(); closeModal('backend-modal'); }
async function removeBackend(name) { if(!confirm(`Remove "${name}"?`))return; await fetch(`${API}/gateway/backends/${name}`,{method:'DELETE'}); await loadGateway(); }

// ─── Achieved ───
async function loadAchieved() {
  try {
    const res = await fetch(`${API}/archived?limit=50`);
    const data = await res.json();
    renderAchieved(data.tasks);
  } catch {}
}

function renderAchieved(achieved) {
  const list = document.getElementById('achieved-list');
  if (!achieved?.length) { list.innerHTML = '<div class="empty"><div class="empty-icon">✓</div>No archived tasks yet</div>'; return; }
  list.innerHTML = achieved.map(t => {
    const dur = t.durationMs ? `${(t.durationMs/1000).toFixed(1)}s` : '';
    const date = t.completedAt ? new Date(t.completedAt).toLocaleString('zh-TW', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
    const label = t.label || (typeof t.task === 'string' ? t.task?.slice(0,80) : t.id);
    const statusIcon = t.status === 'completed' ? '✅' : t.status === 'failed' ? '❌' : '⏭';
    return `<div class="task-item" onclick="this.classList.toggle('expanded')" style="opacity:0.8;">
      <div class="task-header">
        <div style="font-size:12px">${statusIcon}</div>
        <div>
          <div class="task-worker">${t.worker} <span style="color:var(--text-muted);font-weight:300">${t.status}</span></div>
          <div class="task-desc">${escHtml(label)}</div>
        </div>
        <div class="task-meta">${dur}<br>${date}</div>
      </div>
      <div class="task-detail">
        <div style="font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-top:8px;">ID: ${t.id}${t.planId ? ` · Plan: ${t.planId}` : ''}</div>
        <pre>${escHtml((typeof t.result === 'string' ? t.result : JSON.stringify(t.result,null,2))?.slice(0,2000) || '')}</pre>
      </div>
    </div>`;
  }).join('');
}

// ─── Utils ───
function setOnline() { document.getElementById('status-dot').className='status-dot'; document.getElementById('status-text').textContent='connected'; }
function setOffline() { document.getElementById('status-dot').className='status-dot offline'; document.getElementById('status-text').textContent='disconnected'; }
function escHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

init();
</script>
